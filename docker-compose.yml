# =============================================================================
# Lazuli - Docker Compose Configuration
# =============================================================================
# Runs API, Web, and Redis services with proper networking.
#
# Usage:
#   docker compose up --build        # Build and run all services
#   docker compose up -d --build     # Run in background
#   docker compose down              # Stop and remove containers
#   docker compose logs -f           # Follow logs
#
# Redis (optional):
#   Redis is included for distributed caching. To enable it, set in your .env:
#   REDIS_ENABLED=true
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis Service - Distributed Cache (Optional)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lazuli-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API Service - Elysia Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        # Pass host user UID/GID for proper volume permissions
        # Get your UID with: id -u
        # Get your GID with: id -g
        - UID=${UID:-1001}
        - GID=${GID:-1001}
    container_name: lazuli-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Redis configuration - uses Docker service name for host
      - REDIS_ENABLED=${REDIS_ENABLED:-false}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # File logging configuration
      - LOG_FILE_ENABLED=true
      - LOG_FILE_PATH=./logs
      - LOG_FILE_FREQUENCY=daily
      - LOG_FILE_MAX_FILES=14
    env_file:
      - .env
    volumes:
      # Bind mount for direct log file access on host
      # Logs will be in ./logs/api directory relative to docker-compose.yml
      - ./logs/api:/app/apps/api/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Web Service - Next.js Frontend
  # ---------------------------------------------------------------------------
  # Note: NEXT_PUBLIC_* vars are embedded at BUILD time via build args.
  # Set NEXT_PUBLIC_API_URL to your public API endpoint for production.
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Set your public API URL here for production deployment
        # Example: https://api.yourdomain.com
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: lazuli-web
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Internal API URL for server-side requests (Docker networking)
      - INTERNAL_API_URL=http://api:3000
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

# Persistent volumes for data storage
volumes:
  redis_data:
    driver: local
