# =============================================================================
# Lazuli - Docker Compose Configuration
# =============================================================================
# Runs both API and Web services with proper networking.
#
# Usage:
#   docker compose up --build        # Build and run both services
#   docker compose up -d --build     # Run in background
#   docker compose down              # Stop and remove containers
#   docker compose logs -f           # Follow logs
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API Service - Express.js Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lazuli-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Web Service - Next.js Frontend
  # ---------------------------------------------------------------------------
  # Note: NEXT_PUBLIC_* vars are embedded at BUILD time via build args.
  # Set NEXT_PUBLIC_API_URL to your public API endpoint for production.
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Set your public API URL here for production deployment
        # Example: https://api.yourdomain.com
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: lazuli-web
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
