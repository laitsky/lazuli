openapi: 3.0.3
info:
  title: Lazuli Cryptocurrency Trading API
  description: |
    Real-time cryptocurrency data from multiple exchanges (Binance, Bybit, OKX, Hyperliquid, Upbit) to help traders make informed decisions.

    ## Features
    - **Live Ticker Data**: Real-time price, volume, and market statistics
    - **OHLCV Data**: Candlestick data for technical analysis
    - **Custom Pairs**: Create synthetic trading pairs by dividing two tickers
    - **Multi-Exchange Support**: Unified API for Binance, Bybit, OKX, Hyperliquid, and Upbit
    - **Durable History**: Historical archives and saved control-plane state on Cloudflare storage
    - **Public API Keys**: Optional builder keys via `X-API-Key` or `Authorization: Bearer lz_live_...` for metered higher rate limits

    ## Exchange Capabilities
    | Exchange | Spot | Perpetual | Notes |
    |----------|------|-----------|-------|
    | Binance | ✓ | ✓ | Full support |
    | Bybit | ✓ | ✓ | Full support |
    | OKX | ✓ | ✓ | Full support |
    | Hyperliquid | ✗ | ✓ | Perpetual only (DEX) |
    | Upbit | ✓ | ✗ | Spot only (KRW pairs) |

    ## Data Priority
    Live market endpoints fetch exchange data directly and degrade transparently when an upstream provider is unavailable.

  version: 1.0.0
  contact:
    name: Lazuli API Support
  license:
    name: ISC

servers:
  - url: /api/v1
    description: Current server (relative path)
  - url: http://localhost:3000/api/v1
    description: Local development server

tags:
  - name: System
    description: Health checks and system status
  - name: Exchanges
    description: Supported exchanges and their capabilities
  - name: Tickers
    description: Real-time ticker data for trading pairs
  - name: Markets
    description: Available markets and trading pairs
  - name: OHLCV
    description: Candlestick (OHLCV) data for technical analysis
  - name: Custom Pairs
    description: Synthetic trading pairs created by dividing two tickers
  - name: Documentation
    description: API documentation and machine-readable contracts
  - name: Realtime
    description: Public WebSocket topics, private-topic authorization, and snapshot recovery
  - name: Market Data
    description: Live and derived cryptocurrency market data
  - name: Market Intelligence
    description: Order flow, liquidation intelligence, and backtesting
  - name: Screening
    description: Market screening and volume trend discovery
  - name: Institutional
    description: ETF, options, and macro-confluence intelligence
  - name: Funding
    description: Funding rates, basis, carry, and cross-exchange comparisons
  - name: Metrics
    description: Privacy-minimized product telemetry and signed operational reporting
  - name: Admin
    description: Signed operator-only endpoints for health and backfill operations
  - name: Auth
    description: Passwordless account sessions and user identity
  - name: Saved State
    description: Saved workspaces, watchlists, alerts, backtests, and Signal Lab strategies
  - name: Growth
    description: Public Alpha Feed, API keys, and shareable snapshots

paths:
  /ws:
    servers:
      - url: /
        description: Root Worker WebSocket endpoint
    get:
      summary: Get /ws
      tags:
        - Realtime
      responses:
        '101':
          description: WebSocket protocol upgrade
        default:
          $ref: '#/components/responses/InternalServerError'

  /realtime/token:
    post:
      summary: Create or execute /realtime/token
      tags:
        - Realtime
      security:
        - UserBearerSession: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                topics:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Short-lived topic authorization token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /realtime/snapshot:
    get:
      summary: Get /realtime/snapshot
      tags:
        - Realtime
      responses:
        '200':
          description: Sequence recovery snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /docs:
    get:
      summary: API documentation
      description: Serves the API documentation landing page with a link to the runtime OpenAPI JSON contract.
      operationId: serveDocs
      tags:
        - Documentation
      responses:
        '200':
          description: Successfully served documentation page
          content:
            text/html:
              schema:
                type: string

  /health:
    get:
      summary: Health check
      description: Returns API health status, database connectivity, and supported exchanges
      operationId: healthCheck
      tags:
        - System
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - status
                          - api
                          - database
                          - exchanges
                          - timestamp
                        properties:
                          status:
                            type: string
                            enum: [ok]
                            description: Overall API status
                          api:
                            type: string
                            enum: [ready]
                            description: API service status
                          database:
                            type: string
                            enum: [connected, disconnected, not_required, hidden, error]
                            description: Database connection status
                          exchanges:
                            type: array
                            items:
                              type: string
                              enum: [binance, bybit, okx, hyperliquid, upbit]
                            description: List of supported exchanges
                          timestamp:
                            type: integer
                            format: int64
                            description: Unix timestamp in milliseconds
              example:
                success: true
                data:
                  status: 'ok'
                  api: 'ready'
                  database: 'not_required'
                  exchanges: ['binance', 'bybit', 'okx', 'hyperliquid', 'upbit']
                  timestamp: 1704067200000
                error: null
                timestamp: 1704067200000

  /exchanges:
    get:
      summary: List supported exchanges
      description: Returns a list of all supported cryptocurrency exchanges with their capabilities
      operationId: listExchanges
      tags:
        - Exchanges
      responses:
        '200':
          description: Successfully retrieved exchanges list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ExchangeInfo'
              example:
                success: true
                data:
                  - name: 'Binance'
                    id: 'binance'
                    supported: true
                    hasSpot: true
                    hasPerp: true
                  - name: 'Bybit'
                    id: 'bybit'
                    supported: true
                    hasSpot: true
                    hasPerp: true
                  - name: 'OKX'
                    id: 'okx'
                    supported: true
                    hasSpot: true
                    hasPerp: true
                  - name: 'Hyperliquid'
                    id: 'hyperliquid'
                    supported: true
                    hasSpot: false
                    hasPerp: true
                  - name: 'Upbit'
                    id: 'upbit'
                    supported: true
                    hasSpot: true
                    hasPerp: false
                error: null
                timestamp: 1704067200000
        '500':
          $ref: '#/components/responses/InternalServerError'

  /metrics/events:
    post:
      summary: Record a privacy-minimized product metric
      tags:
        - Metrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [metric]
              properties:
                metric:
                  type: string
                value:
                  type: number
                  minimum: 0
                  maximum: 1000000
                  default: 1
                dimensions:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        '200':
          description: Metric accepted
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /tickers/{exchange}:
    get:
      summary: Get all tickers for an exchange
      description: |
        Retrieves real-time ticker data for all trading pairs on a specific exchange.
        Supports pagination, filtering, sorting, and search.
      operationId: getAllTickers
      tags:
        - Tickers
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 1
          example: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
          example: 100
        - name: type
          in: query
          description: Filter by market type
          schema:
            type: string
            enum: [spot, perp]
          example: spot
        - name: search
          in: query
          description: Search by symbol (case-insensitive, max 50 chars)
          schema:
            type: string
            maxLength: 50
          example: BTC
        - name: sortBy
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [volume, price, change]
            default: volume
          example: volume
        - name: sortOrder
          in: query
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          example: desc
      responses:
        '200':
          description: Successfully retrieved tickers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TickersData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tickers/{exchange}/{symbol}:
    get:
      summary: Get specific ticker data
      description: Retrieves real-time ticker data for a specific trading pair on an exchange
      operationId: getTicker
      tags:
        - Tickers
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - name: symbol
          in: path
          required: true
          description: Trading pair symbol (e.g., BTC/USDT, BTC-USDT)
          schema:
            type: string
          example: BTC/USDT
      responses:
        '200':
          description: Successfully retrieved ticker
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Ticker'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /markets/{exchange}:
    get:
      summary: Get all markets for an exchange
      description: |
        Retrieves all available markets (trading pairs) for a specific exchange.
        Supports pagination, filtering by type, search, and active status filtering.
      operationId: getMarkets
      tags:
        - Markets
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: type
          in: query
          description: Filter by market type
          schema:
            type: string
            enum: [spot, perp]
        - name: search
          in: query
          description: Search by symbol (case-insensitive, max 50 chars)
          schema:
            type: string
            maxLength: 50
        - name: active
          in: query
          description: Filter by active status
          schema:
            type: boolean
      responses:
        '200':
          description: Successfully retrieved markets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MarketsData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /ohlcv/{exchange}/{symbol}:
    get:
      summary: Get OHLCV candlestick data
      description: Retrieves OHLCV (Open, High, Low, Close, Volume) candlestick data for technical analysis
      operationId: getOHLCV
      tags:
        - OHLCV
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - name: symbol
          in: path
          required: true
          description: Trading pair symbol
          schema:
            type: string
          example: BTC/USDT
        - name: timeframe
          in: query
          required: true
          description: Candlestick timeframe
          schema:
            $ref: '#/components/schemas/Timeframe'
          example: 1h
        - name: type
          in: query
          description: Market type
          schema:
            type: string
            enum: [spot, perp]
            default: spot
        - name: limit
          in: query
          description: Number of candles to fetch
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: Successfully retrieved OHLCV data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OHLCVData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /ohlcv/multi/{exchange}/{symbol}:
    get:
      summary: Get multi-timeframe OHLCV data
      description: |
        Retrieves OHLCV data for multiple timeframes simultaneously.
        Useful for multi-timeframe analysis. Handles partial failures gracefully.
      operationId: getMultiTimeframeOHLCV
      tags:
        - OHLCV
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - name: symbol
          in: path
          required: true
          description: Trading pair symbol
          schema:
            type: string
          example: BTC/USDT
        - name: timeframes
          in: query
          required: true
          description: Comma-separated list of timeframes (max 8)
          schema:
            type: string
            pattern: '^(1m|5m|15m|1h|4h|1d|3d|1w)(,(1m|5m|15m|1h|4h|1d|3d|1w))*$'
          example: '1m,5m,15m,1h'
        - name: type
          in: query
          description: Market type
          schema:
            type: string
            enum: [spot, perp]
            default: spot
        - name: limit
          in: query
          description: Number of candles per timeframe
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: Successfully retrieved multi-timeframe OHLCV data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MultiTimeframeOHLCVData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /custom-pair/{exchange}/{symbol1}/{symbol2}:
    get:
      summary: Generate custom pair
      description: |
        Creates a synthetic trading pair by dividing symbol1 by symbol2 OHLCV data.
        Example: BTC-USDT / AVAX-USDT = BTC/AVAX custom pair
      operationId: getCustomPair
      tags:
        - Custom Pairs
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - name: symbol1
          in: path
          required: true
          description: Numerator symbol
          schema:
            type: string
          example: BTC-USDT
        - name: symbol2
          in: path
          required: true
          description: Denominator symbol
          schema:
            type: string
          example: AVAX-USDT
        - name: timeframe
          in: query
          required: true
          description: Candlestick timeframe
          schema:
            $ref: '#/components/schemas/Timeframe'
          example: 1h
        - name: type
          in: query
          description: Market type
          schema:
            type: string
            enum: [spot, perp]
            default: spot
        - name: limit
          in: query
          description: Number of candles to fetch
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: Successfully generated custom pair
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CustomPairData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /custom-index:
    post:
      summary: Create or execute /custom-index
      tags:
        - Market Data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, exchange, timeframe, assets]
              properties:
                name: { type: string, minLength: 1, maxLength: 120 }
                exchange: { type: string, enum: [binance, bybit, okx, hyperliquid, upbit] }
                timeframe: { type: string, enum: [1m, 5m, 15m, 1h, 4h, 1d, 3d, 1w] }
                limit: { type: integer, minimum: 1, maximum: 1000 }
                assets:
                  type: array
                  minItems: 1
                  maxItems: 25
                  items:
                    type: object
                    required: [symbol, weight]
                    properties:
                      symbol: { type: string }
                      weight: { type: number, exclusiveMinimum: 0 }
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /superema/{exchange}/{symbol}:
    parameters:
      - name: exchange
        in: path
        required: true
        schema:
          type: string
      - name: symbol
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get /superema/exchange/symbol
      tags:
        - Market Data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /indicators/{exchange}/{symbol}:
