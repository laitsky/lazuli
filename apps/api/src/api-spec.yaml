      summary: Get /orderflow/exchange/symbol
      tags:
        - Market Intelligence
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /screener/{exchange}/stats:
    parameters:
      - name: exchange
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get /screener/exchange/stats
      tags:
