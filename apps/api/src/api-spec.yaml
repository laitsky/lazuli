                symbols:
                  type: array
                  items: { type: string }
                types:
                  type: array
                  items: { type: string, enum: [spot, perp] }
                timeframes:
                  type: array
                  items: { type: string, enum: [1m, 5m, 15m, 1h, 4h, 1d, 3d, 1w] }
                startTime: { type: integer, format: int64 }
                endTime: { type: integer, format: int64 }
                maxSymbolsPerExchange: { type: integer, minimum: 1, maximum: 50 }
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /admin/health:
    get:
      summary: Deep admin health check
      description: Requires signed admin request headers. Returns redacted dependency readiness and operational health details.
      operationId: adminHealthCheck
      tags:
        - Admin
      security:
        - AdminSignedRequest: []
      parameters:
        - $ref: '#/components/parameters/AdminKeyIdHeader'
        - $ref: '#/components/parameters/AdminTimestampHeader'
        - $ref: '#/components/parameters/AdminNonceHeader'
        - $ref: '#/components/parameters/AdminSignatureHeader'
      responses:
        '200':
          description: Deep health status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
        '401':
          description: Missing or invalid signed admin request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/metrics:
