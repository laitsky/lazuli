              $ref: '#/components/schemas/SavedWorkspaceRecord'

    SavedWorkspaceListApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/SavedWorkspaceRecord'

    WatchlistApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/WatchlistRecord'

    WatchlistListApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/WatchlistRecord'

    PriceAlertApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PriceAlertRecord'

    PriceAlertListApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/PriceAlertRecord'

    AlertEvaluationApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AlertEvaluationResponse'

    SavedBacktestApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SavedBacktestRecord'

    SavedBacktestListApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/SavedBacktestRecord'

    SignalLabStrategyApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SignalLabStrategy'

    SignalLabStrategyListApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/SignalLabStrategy'

    ApiKeyListApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ApiKeyRecord'

    ApiKeyCreateApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ApiKeyCreateResponse'

    AlphaFeedApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AlphaFeedResponse'

    AlphaFeedItemApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AlphaFeedItem'

    PasskeyOptionsResponse:
      type: object
      required:
        - challengeId
        - options
        - expiresAt
      properties:
        challengeId:
          type: string
          description: One-use server-side WebAuthn challenge identifier.
        options:
          type: object
          description: WebAuthn options JSON passed to @simplewebauthn/browser.
          additionalProperties: true
        expiresAt:
          type: integer
          format: int64
          description: Challenge expiry as a Unix timestamp in milliseconds.

    PasskeyRegistrationVerifyRequest:
      type: object
      required:
        - challengeId
        - response
      properties:
        challengeId:
          type: string
        response:
          type: object
          description: RegistrationResponseJSON from @simplewebauthn/browser.
          additionalProperties: true
        name:
          type: string
          description: Optional user-facing device label.

    PasskeyAuthenticationVerifyRequest:
      type: object
      required:
        - challengeId
        - response
      properties:
        challengeId:
          type: string
        response:
          type: object
          description: AuthenticationResponseJSON from @simplewebauthn/browser.
          additionalProperties: true

    PasskeyRecord:
      type: object
      required:
        - id
        - userId
        - credentialId
        - name
        - transports
        - deviceType
        - backedUp
        - createdAt
        - lastUsedAt
      properties:
        id:
          type: string
        userId:
          type: string
        credentialId:
          type: string
          description: Public WebAuthn credential ID. Public keys and counters are never returned.
        name:
          type: string
          nullable: true
        transports:
          type: array
          items:
            type: string
            enum: [ble, cable, hybrid, internal, nfc, smart-card, usb]
        deviceType:
          type: string
          nullable: true
        backedUp:
          type: boolean
        createdAt:
          type: integer
          format: int64
        lastUsedAt:
          type: integer
          format: int64
          nullable: true

    PriceAlertCreateRequest:
      type: object
      required:
        - exchange
        - symbol
        - priceTarget
        - condition
      properties:
        exchange:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
        symbol:
          type: string
          example: BTC-USDT
        marketType:
          type: string
          enum: [spot, perp]
        priceTarget:
          type: number
          minimum: 0
        condition:
          type: string
          enum: [above, below]
        delivery:
          type: object
          description: Channel preferences for native email, Discord, Telegram, webhook, and optional relay delivery. Provider secrets stay in Worker secrets/vars, not in Lazuli D1.
          additionalProperties: true
          example:
            channels: [email, discord, telegram, webhook]
            email: user@example.com
            discord:
              channelId: alerts
            telegram:
              chatId: '123456789'
            webhook:
              url: https://example.com/lazuli-alerts
        metadata:
          type: object
          additionalProperties: true

    SignalLabStrategyRequest:
      type: object
      required:
        - name
        - exchange
        - symbol
        - timeframe
        - strategy
      properties:
        name:
          type: string
          example: BTC Momentum v1
        exchange:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
        symbol:
          type: string
          example: BTC-USDT
        marketType:
          type: string
          enum: [spot, perp]
        timeframe:
          type: string
          enum: [1m, 5m, 15m, 1h, 4h, 1d, 3d, 1w]
        autoBacktest:
          type: boolean
          description: Run a bounded server-side backtest immediately and store it as the latest snapshot.
        strategy:
          type: object
          required:
            - name
            - mode
            - fastPeriod
            - slowPeriod
            - rsiPeriod
            - rsiOversold
            - rsiOverbought
            - feeBps
          properties:
            name:
              type: string
            mode:
              type: string
              enum: [momentum, mean-reversion, breakout]
            fastPeriod:
              type: integer
              minimum: 2
            slowPeriod:
              type: integer
              minimum: 3
            rsiPeriod:
              type: integer
              minimum: 2
            rsiOversold:
              type: number
            rsiOverbought:
              type: number
            feeBps:
              type: number

    # Exchange schemas
    ExchangeInfo:
      type: object
      required:
        - name
        - id
        - supported
        - hasSpot
        - hasPerp
      properties:
        name:
          type: string
          description: Display name of the exchange
          example: Binance
        id:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
          description: Exchange identifier
          example: binance
        supported:
          type: boolean
          description: Whether the exchange is currently supported
          example: true
        hasSpot:
          type: boolean
          description: Whether exchange supports spot markets
          example: true
        hasPerp:
          type: boolean
          description: Whether exchange supports perpetual futures markets
          example: true

    # Ticker schemas
    Ticker:
      type: object
      required:
        - symbol
        - exchange
        - type
        - timestamp
      properties:
        symbol:
          type: string
          description: Trading pair symbol
          example: BTC/USDT
        exchange:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
          description: Exchange identifier
          example: binance
        type:
          type: string
          enum: [spot, perp]
          description: Market type
          example: spot
        bid:
          type: number
          nullable: true
          description: Highest bid price
          example: 43250.50
        ask:
          type: number
          nullable: true
          description: Lowest ask price
          example: 43251.00
        last:
          type: number
          nullable: true
          description: Last traded price
          example: 43250.75
        high24h:
          type: number
          nullable: true
          description: 24h highest price
          example: 44000.00
        low24h:
          type: number
          nullable: true
          description: 24h lowest price
          example: 42000.00
        volume24h:
          type: number
          nullable: true
          description: 24h trading volume in base currency
          example: 15420.5
        quoteVolume24h:
          type: number
          nullable: true
          description: 24h trading volume in quote currency
          example: 667000000
        change24h:
          type: number
          nullable: true
          description: 24h absolute price change
          example: 1250.75
        percentage24h:
          type: number
          nullable: true
          description: 24h percentage change
          example: 2.98
        timestamp:
          type: integer
          format: int64
          description: Data timestamp in milliseconds
          example: 1704067200000
        fundingRate:
          type: number
          nullable: true
          description: Current funding rate (perpetual markets only)
          example: 0.0001
        openInterest:
          type: number
          nullable: true
          description: Total open interest (perpetual markets only)
          example: 25000.5

    TickersData:
      type: object
      required:
        - exchange
        - tickers
        - count
        - pagination
      properties:
        exchange:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
          description: Exchange identifier
        tickers:
          type: array
          items:
            $ref: '#/components/schemas/Ticker'
          description: Array of ticker data
        count:
          type: integer
          description: Number of tickers in current page
          example: 100
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
        filters:
          type: object
          description: Applied filters
          properties:
            type:
              type: string
              enum: [spot, perp]
              nullable: true
            search:
              type: string
              nullable: true
            sortBy:
              type: string
              enum: [volume, price, change]
            sortOrder:
              type: string
              enum: [asc, desc]

    # Market schemas
    Market:
      type: object
      required:
        - id
        - symbol
        - base
        - quote
        - type
        - active
        - exchange
      properties:
        id:
          type: string
          description: Market identifier
          example: BTC/USDT
        symbol:
          type: string
          description: Trading pair symbol
          example: BTC/USDT
        base:
          type: string
          description: Base currency
          example: BTC
        quote:
          type: string
          description: Quote currency
          example: USDT
        type:
          type: string
          enum: [spot, perp]
          description: Market type
          example: spot
        active:
          type: boolean
          description: Whether market is active for trading
          example: true
        exchange:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
          description: Exchange identifier
          example: binance

    MarketsData:
      type: object
      required:
        - exchange
        - markets
        - count
        - pagination
      properties:
        exchange:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
        count:
          type: integer
          description: Number of markets in current page
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
        filters:
          type: object
          properties:
            type:
              type: string
              enum: [spot, perp]
              nullable: true
            search:
              type: string
              nullable: true
            active:
              type: boolean
              nullable: true

    # OHLCV schemas
    Timeframe:
      type: string
      enum: [1m, 5m, 15m, 1h, 4h, 1d, 3d, 1w]
      description: Candlestick timeframe
      example: 1h

    OHLCV:
      type: object
      required:
        - timestamp
        - open
        - high
        - low
        - close
        - volume
      properties:
        timestamp:
          type: integer
          format: int64
          description: Candle start timestamp in milliseconds
          example: 1704067200000
        open:
          type: number
          description: Opening price
          example: 43200.00
        high:
          type: number
          description: Highest price in the period
          example: 43400.00
        low:
          type: number
          description: Lowest price in the period
          example: 43100.00
        close:
          type: number
          description: Closing price
          example: 43250.00
        volume:
          type: number
          description: Trading volume in base currency
          example: 125.5

    OHLCVData:
      type: object
      required:
        - exchange
        - symbol
        - timeframe
        - candles
        - count
      properties:
        exchange:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
        symbol:
          type: string
          example: BTC/USDT
        timeframe:
          $ref: '#/components/schemas/Timeframe'
        candles:
          type: array
          items:
            $ref: '#/components/schemas/OHLCV'
        count:
          type: integer
          description: Number of candles returned
          example: 100

    MultiTimeframeOHLCVData:
      type: object
      required:
        - exchange
        - symbol
        - marketType
        - timeframes
        - summary
      properties:
        exchange:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
        symbol:
          type: string
        marketType:
          type: string
          enum: [spot, perp]
        timeframes:
          type: array
          items:
            type: object
            required:
              - timeframe
              - candles
              - count
              - success
            properties:
              timeframe:
                $ref: '#/components/schemas/Timeframe'
              candles:
                type: array
                items:
                  $ref: '#/components/schemas/OHLCV'
              count:
                type: integer
              success:
                type: boolean
              error:
                type: string
                nullable: true
        summary:
          type: object
          required:
            - total
            - successful
            - failed
          properties:
            total:
              type: integer
              description: Total number of timeframes requested
            successful:
              type: integer
              description: Number of successful fetches
            failed:
              type: integer
              description: Number of failed fetches

    # Custom Pair schemas
    CustomPairData:
      type: object
      required:
        - exchange
        - symbol1
        - symbol2
        - customPairSymbol
        - timeframe
        - marketType
        - candles
        - count
      properties:
        exchange:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
        symbol1:
          type: string
          description: Numerator symbol
          example: BTC-USDT
        symbol2:
          type: string
          description: Denominator symbol
          example: AVAX-USDT
        customPairSymbol:
          type: string
          description: Resulting custom pair symbol
          example: BTC/AVAX
        timeframe:
          $ref: '#/components/schemas/Timeframe'
        marketType:
          type: string
          enum: [spot, perp]
        candles:
          type: array
          items:
            $ref: '#/components/schemas/OHLCV'
        count:
          type: integer
          description: Number of candles in custom pair

    # Pagination schema
    PaginationMeta:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
        - hasNext
        - hasPrev
      properties:
        page:
          type: integer
          minimum: 1
          description: Current page number (1-indexed)
          example: 1
        limit:
          type: integer
          minimum: 1
          description: Items per page
          example: 100
        total:
          type: integer
          minimum: 0
          description: Total number of items
          example: 1543
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages
          example: 16
        hasNext:
          type: boolean
          description: Whether there is a next page
          example: true
        hasPrev:
          type: boolean
          description: Whether there is a previous page
          example: false
