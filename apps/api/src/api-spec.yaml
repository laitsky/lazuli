          description: Successful response
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /trending/{exchange}:
    parameters:
      - name: exchange
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get /trending/exchange
      tags:
        - Screening
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /screener/{exchange}/ohlcv:
    parameters:
      - name: exchange
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Create or execute /screener/exchange/ohlcv
      tags:
        - Screening
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbols]
              properties:
                symbols:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items: { type: string }
                period: { type: string, enum: [1h, 4h, 24h, 7d, 30d] }
                items:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /arbitrage/prices:
