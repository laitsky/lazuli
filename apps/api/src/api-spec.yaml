  /institutional/options/surface:
    get:
      summary: Get observed options IV surface and ATM term structure
      description: Returns observed strike/maturity IV only, with explicit missing and illiquid quality masks. No values are fabricated by interpolation.
      tags:
        - Institutional
      parameters:
        - name: asset
          in: query
          schema:
            type: string
            enum: [BTC, ETH]
      responses:
        '200':
          description: Observed IV matrix, term structure, skew, walls, and coverage
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /institutional/macro/history:
    get:
      summary: Get free-source macro history
      description: Returns BTC dominance, stablecoin supply, and Fear & Greed history with independently reported provider freshness and degradation.
      tags:
        - Institutional
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 1y]
      responses:
        '200':
          description: Normalized macro series and provider status
          content:
            application/json:
              schema:
