  /admin/release-controls:
    get:
      summary: Read rollout controls and immutable audit history
      tags:
        - Admin
      security:
        - AdminSignedRequest: []
      parameters:
        - name: flag
          in: query
          schema:
            type: string
            enum:
              [
                realtime,
                accounts,
                alerts,
                delivery_channels,
                cron_reconciliation,
                async_backtests,
                admin_operations,
              ]
        - name: auditLimit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 100
      responses:
        '200':
          description: Current rollout controls and append-only audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /admin/release-controls/{flag}:
    parameters:
      - name: flag
        in: path
        required: true
        schema:
          type: string
          enum:
            [
              realtime,
              accounts,
              alerts,
              delivery_channels,
              cron_reconciliation,
              async_backtests,
              admin_operations,
            ]
    put:
      summary: Atomically update a rollout control
      description: Requires the current revision and appends an immutable audit event.
      tags:
        - Admin
      security:
        - AdminSignedRequest: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state, expectedRevision, reason]
              properties:
                state:
                  type: string
                  enum: [off, internal, '5', '25', '100']
                expectedRevision:
                  type: integer
                  minimum: 0
                reason:
                  type: string
                  minLength: 1
                  maxLength: 500
                subjectAllowlist:
                  type: array
                  maxItems: 500
                  items: { type: string }
                providerAllowlist:
                  type: array
                  maxItems: 500
                  items: { type: string }
                topicAllowlist:
                  type: array
                  maxItems: 500
                  items: { type: string }
      responses:
        '200':
          description: Updated rollout control
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessResponse'
        '409':
          description: The expected revision is stale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /admin/fault-injections:
    get:
      summary: List active staging fault injections
      description: Signed, staging-only operational endpoint. Production returns not found.
      operationId: listStagingFaultInjections
      tags:
        - Admin
      security:
        - AdminSignedRequest: []
      responses:
        '200':
          description: Current bounded fault-injection state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'
    put:
      summary: Enable or disable a bounded staging fault
      description: Requires a signed admin request and a change ID; rejected outside local or staging.
      operationId: updateStagingFaultInjection
      tags:
        - Admin
      security:
        - AdminSignedRequest: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target, enabled, changeId]
              properties:
                target:
                  type: string
                  enum: [provider, d1, r2, queue, delivery]
                enabled: { type: boolean }
                durationSeconds: { type: integer, minimum: 5, maximum: 900, default: 60 }
                changeId: { type: string, minLength: 3, maxLength: 120 }
                config: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Updated fault state and expiry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /admin/notification-channels/re-encrypt:
    post:
      summary: Re-encrypt one bounded notification-channel page
      description: Uses the staged next encryption key and returns a cursor until the rotation is complete.
      operationId: reencryptNotificationChannels
      tags:
        - Admin
      security:
        - AdminSignedRequest: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                limit: { type: integer, minimum: 1, maximum: 100, default: 50 }
                cursor: { type: string, nullable: true }
      responses:
        '200':
          description: Bounded rotation progress and target key ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /admin/alert-deliveries/{id}/replay:
    post:
      summary: Replay an indeterminate non-idempotent alert delivery
      description: Signed operator-only recovery. Requires explicit duplicate-risk confirmation and appends a sanitized audit event before requeueing.
      operationId: replayIndeterminateAlertDelivery
      tags:
        - Admin
      security:
        - AdminSignedRequest: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, pattern: '^nda_[a-zA-Z0-9-]{1,64}$' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason, changeId, confirmDuplicateRisk]
              properties:
                reason: { type: string, minLength: 3, maxLength: 500 }
                changeId: { type: string, minLength: 3, maxLength: 120 }
                confirmDuplicateRisk: { type: boolean, enum: [true] }
      responses:
        '200':
          description: Audited replay result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

