          type: string
    post:
      summary: Create or execute /admin/backfills/id/retry
      tags:
        - Admin
      security:
        - AdminSignedRequest: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  /openapi.json:
    get:
      summary: Get /openapi.json
      tags:
        - Documentation
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
              $ref: '#/components/schemas/ApiSuccessResponse'
        default:
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    AdminSignedRequest:
      type: apiKey
      in: header
      name: X-Admin-Signature
      description: HMAC-SHA256 signature over method, normalized path+query, timestamp, nonce, and body hash.
    UserBearerSession:
      type: http
      scheme: bearer
      description: Session token returned by /auth/magic-link/verify.
    PublicApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: 'Optional public API key for metered builder-tier rate limits. The same key may also be sent as `Authorization: Bearer lz_live_...`.'

  parameters:
    ExchangeParam:
      name: exchange
      in: path
      required: true
      description: Exchange identifier
      schema:
        type: string
        enum: [binance, bybit, okx, hyperliquid, upbit]
      example: binance
    AdminKeyIdHeader:
      name: X-Admin-Key-Id
      in: header
      required: true
      description: Configured admin key identifier for staging/production.
      schema:
        type: string
    AdminTimestampHeader:
      name: X-Admin-Timestamp
      in: header
      required: true
      description: Millisecond Unix timestamp within a five-minute window.
      schema:
        type: string
    AdminNonceHeader:
      name: X-Admin-Nonce
      in: header
      required: true
      description: One-time nonce, 16-128 URL-safe characters, rejected on replay.
      schema:
        type: string
    AdminSignatureHeader:
      name: X-Admin-Signature
      in: header
      required: true
      description: HMAC-SHA256 hex signature using ADMIN_SIGNING_SECRET.
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request - Invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            data: null
            error: 'Exchange binancee not supported'
            timestamp: 1704067200000

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            data: null
            error: 'Ticker BTC/USDT not found on binance'
            timestamp: 1704067200000

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            data: null
            error: 'Failed to fetch tickers: Network error'
            timestamp: 1704067200000

    RateLimited:
      description: Too many requests or limiter unavailable for a fail-closed route
      headers:
        Retry-After:
          schema:
            type: string
        X-RateLimit-Remaining:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          example:
            success: false
            data: null
            error: 'Too many requests'
            code: 'EXCHANGE_RATE_LIMIT'
            timestamp: 1704067200000
            meta:
              requestId: '018f8b78-3f5b-7b7c-a077-9d1cdd80c235'
              rateLimit:
                retryAfterMs: 1000

  schemas:
    # Base response schemas
    ApiSuccessResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
      properties:
        success:
          type: boolean
          enum: [true]
          description: Request success status
        data:
          description: Response data (type varies by endpoint)
        error:
          type: 'null'
          description: Error message (null on success)
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
        meta:
          $ref: '#/components/schemas/ApiResponseMeta'

    ApiErrorResponse:
      type: object
      required:
        - success
        - data
        - error
        - timestamp
      properties:
        success:
          type: boolean
          enum: [false]
          description: Request success status
        data:
          type: 'null'
          description: Response data (null on error)
        error:
          type: string
          description: Error message
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
        code:
          type: string
          description: Stable machine-readable error code
        meta:
          $ref: '#/components/schemas/ApiResponseMeta'

    ApiResponseMeta:
      type: object
      description: Optional tracing, cache, and rate-limit metadata.
      additionalProperties: true
      properties:
        requestId:
          type: string
        cache:
          type: object
          additionalProperties: true
          properties:
            source:
              type: string
            ageMs:
              type: integer
            stale:
              type: boolean
            refreshError:
              type: string
        rateLimit:
          type: object
          additionalProperties: true
          properties:
            remaining:
              type: integer
            retryAfterMs:
              type: integer
            unavailable:
              type: boolean

    UserAccount:
      type: object
      required: [id, email, displayName, createdAt, lastLoginAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
          nullable: true
        createdAt:
          type: integer
          format: int64
        lastLoginAt:
          type: integer
          format: int64
          nullable: true

    AuthMagicLinkResponse:
      type: object
      required: [email, expiresAt, delivered, magicLink]
      properties:
        email:
          type: string
          format: email
        expiresAt:
          type: integer
          format: int64
        delivered:
          type: boolean
        magicLink:
          type: string
          nullable: true
          description: Present only in explicit local development; always null in staging and production.

    AuthSessionResponse:
      type: object
      additionalProperties: false
      required: [user, sessionToken, expiresAt]
      properties:
        user:
          $ref: '#/components/schemas/UserAccount'
        sessionToken:
          type: string
        expiresAt:
          type: integer
          format: int64

    AuthBrowserSessionResponse:
      type: object
      additionalProperties: false
      required: [user, expiresAt]
      properties:
        user:
          $ref: '#/components/schemas/UserAccount'
        expiresAt:
          type: integer
          format: int64

    LiquidationRadarApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              type: object
              required: [exchange, symbol, type, levels, nativePrints, nativeCoverage, timestamp]
              properties:
                exchange: { type: string, enum: [binance, bybit, okx, hyperliquid] }
                symbol: { type: string }
                type: { type: string, enum: [perp] }
                markPrice: { type: number, nullable: true }
                openInterestUsd: { type: number, nullable: true }
                levels:
                  type: array
                  items: { type: object, additionalProperties: true }
                nativePrints:
                  type: array
                  items:
                    type: object
                    required:
                      [eventId, sequence, exchangeTimestamp, side, price, quantity, provenance]
                    properties:
                      eventId: { type: string }
                      sequence: { type: integer }
                      exchangeTimestamp: { type: integer, format: int64 }
                      ingestedAt: { type: integer, format: int64 }
                      publishedAt: { type: integer, format: int64 }
                      side: { type: string, enum: [long, short] }
                      price: { type: number }
                      quantity: { type: number }
                      notionalUsd: { type: number, nullable: true }
                      provenance: { type: object, additionalProperties: true }
                nativeCoverage:
                  type: object
                  required: [status, count, latestExchangeTimestamp, sequence]
                  properties:
                    status: { type: string, enum: [live, empty, unavailable] }
                    count: { type: integer }
                    latestExchangeTimestamp: { type: integer, format: int64, nullable: true }
                    sequence: { type: integer, nullable: true }
                heatmap:
                  type: array
                  items: { type: object, additionalProperties: true }
                cascades:
                  type: array
                  items: { type: object, additionalProperties: true }
                assumptions: { type: object, additionalProperties: true }
                timestamp: { type: integer, format: int64 }

    DeletionResponse:
      type: object
      properties:
        deleted:
          type: boolean
        revoked:
          type: boolean
      additionalProperties: false

    SavedWorkspaceRecord:
      type: object
      required: [id, userId, name, state, isDefault, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        state:
          type: object
          additionalProperties: true
        isDefault:
          type: boolean
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64

    WatchlistRecord:
      type: object
      required: [id, userId, name, items, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        items:
          type: array
          items:
            type: string
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64

    SavedBacktestRecord:
      type: object
      required:
        [id, userId, name, exchange, symbol, timeframe, strategy, result, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        exchange:
          type: string
        symbol:
          type: string
        timeframe:
          type: string
        strategy:
          type: object
          additionalProperties: true
        result:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64

    PriceAlertRecord:
      type: object
      required:
        - id
        - userId
        - symbol
        - exchange
        - marketType
        - priceTarget
        - condition
        - active
        - triggeredAt
        - topic
        - delivery
        - metadata
        - lastPrice
        - lastEvaluatedAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        userId:
          type: string
          nullable: true
        symbol:
          type: string
        exchange:
          type: string
        marketType:
          type: string
          enum: [spot, perp]
        priceTarget:
          type: number
        condition:
          type: string
          enum: [above, below]
        active:
          type: boolean
        triggeredAt:
          type: integer
          format: int64
          nullable: true
        topic:
          type: string
          nullable: true
        delivery:
          type: object
          nullable: true
          additionalProperties: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        lastPrice:
          type: number
          nullable: true
        lastEvaluatedAt:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64

    AlertEvaluationResponse:
      type: object
      required: [evaluated, triggered, events]
      properties:
        evaluated:
          type: integer
        triggered:
          type: integer
        events:
          type: array
          items:
            type: string

    SignalLabStrategy:
      type: object
      required:
        - id
        - userId
        - name
        - exchange
        - symbol
        - marketType
        - timeframe
        - strategy
        - version
        - parentId
        - latestBacktest
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        exchange:
          type: string
          enum: [binance, bybit, okx, hyperliquid, upbit]
        symbol:
          type: string
        marketType:
          type: string
          enum: [spot, perp]
        timeframe:
          type: string
          enum: [1m, 5m, 15m, 1h, 4h, 1d, 3d, 1w]
        strategy:
          type: object
          additionalProperties: true
        version:
          type: integer
        parentId:
          type: string
          nullable: true
        latestBacktest:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64

    ApiKeyRecord:
      type: object
      required: [id, userId, name, keyPrefix, scopes, createdAt, lastUsedAt, revokedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        createdAt:
          type: integer
          format: int64
        lastUsedAt:
          type: integer
          format: int64
          nullable: true
        revokedAt:
          type: integer
          format: int64
          nullable: true

    ApiKeyCreateResponse:
      allOf:
        - $ref: '#/components/schemas/ApiKeyRecord'
        - type: object
          required: [secret]
          properties:
            secret:
              type: string

    AlphaFeedItem:
      type: object
      required: [id, kind, title, summary, score, href, payload, timestamp]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [trending, funding-arbitrage, liquidation, price-arbitrage]
        title:
          type: string
        summary:
          type: string
        score:
          type: number
        href:
          type: string
        payload:
          type: object
          additionalProperties: true
        timestamp:
          type: integer
          format: int64

    AlphaFeedResponse:
      type: object
      required: [items, count, timestamp]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AlphaFeedItem'
        count:
          type: integer
        timestamp:
          type: integer
          format: int64

    AuthMagicLinkApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthMagicLinkResponse'

    AuthSessionApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              oneOf:
                - $ref: '#/components/schemas/AuthBrowserSessionResponse'
                - $ref: '#/components/schemas/AuthSessionResponse'

    UserAccountApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserAccount'

    DeletionApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessResponse'
        - type: object
