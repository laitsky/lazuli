name: Staging Provider Readiness

on:
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: Continuous observation duration (minimum 900)
        required: true
        default: '900'

permissions:
  contents: read

concurrency:
  group: staging-provider-readiness
  cancel-in-progress: false

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout immutable release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Run continuous readiness gate
        env:
          STAGING_OPS_READ_SECRET: ${{ secrets.STAGING_OPS_READ_SECRET }}
          READINESS_DURATION_SECONDS: ${{ inputs.duration_seconds }}
          READINESS_INTERVAL_SECONDS: '60'
        run: bun run scripts/ops/staging-readiness.ts

      - name: Upload readiness evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: staging-provider-readiness-${{ github.sha }}
          path: .artifacts/ops/staging-readiness.json
          if-no-files-found: error
          retention-days: 30
