name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        # actions/checkout@v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Bun
        # oven-sh/setup-bun@v2
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate strategy completion evidence
        run: bun run strategy:validate

      - name: Test operational evidence gates
        run: bun test scripts/ops/release-evidence.test.ts

      - name: Reject stale generated OpenAPI
        run: bun run generate:openapi && git diff --exit-code -- apps/api/src/generated-openapi.ts

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun test

      - name: Test ingest adapters
        run: bun run --filter @lazuli/ingest test

      - name: Apply D1 migrations and verify rerun
        run: bun run --filter @lazuli/api db:migrate && bun run --filter @lazuli/api db:migrate

      - name: Build API
        run: bun run build:api

      - name: Build Web
        run: bun run build:web

      - name: Build ingest Worker
        run: bun run --filter @lazuli/ingest build

      - name: Build ingest Container image
        run: bun run --filter @lazuli/ingest build:image
